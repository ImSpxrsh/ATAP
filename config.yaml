# config.yaml — single source of truth for paths, seeds, thresholds, gene panels.
# No magic numbers in analysis code; everything tunable lives here (GUARDRAILS §6).

seed: 20260710

paths:
  data_raw: data/raw
  data_interim: data/interim
  data_processed: data/processed
  outputs_figures: outputs/figures
  outputs_tables: outputs/tables
  outputs_logs: outputs/logs
  manifest: data/raw/MANIFEST.md

# ---------------------------------------------------------------------------
# Gene panels (M1). HGNC symbols; Ensembl mapping resolved in src/panels.py.
# ---------------------------------------------------------------------------
panels:
  executioners: [BAX, BAK1]
  guardians: [BCL2, MCL1, BCL2L1, BCL2A1, BCL2L2]   # BCL-xL, Bfl-1, Bcl-w
  sensitizers: [PMAIP1, BBC3, BID, BCL2L11, BAD]     # NOXA, PUMA, BID, BIM, BAD
  # ATAP-susceptibility signature genes (Task 3 of Overnight spec). Rationale
  # for each lives in src/signature.py header — do not add genes silently.
  signature_extra:
    mito_import: [TIMM23, TIMM17A, TIMM17B, TIMM50, TOMM20, TOMM22, TOMM40, TOMM70]
    cardiolipin: [CRLS1]

# ---------------------------------------------------------------------------
# Loss-of-function / executioner-loss thresholds (M1). All decisions logged
# in DECISIONS.md with reasons.
# ---------------------------------------------------------------------------
executioner_loss:
  # Expression bottom-quantile cutoff for "low" BAX/BAK1 (both must be low).
  expr_low_quantile: 0.10
  # Copy-number deep-deletion cutoff on DepMap OmicsCNGene, which is LINEAR relative
  # copy number (neutral ~1.0, confirmed: heme BAX median 1.01, min 0.49). A gene with
  # relative CN <= this is treated as a deep/homozygous deletion. 0.25 ~ log2 -2, the
  # standard deep-deletion bar; single-copy loss (~0.5) is intentionally NOT counted as
  # executioner LOF because one intact allele can still make functional protein.
  cn_deep_del_relative: 0.25
  # For cBioPortal/TCGA GISTIC calls, deep deletion = -2 (handled in harmonize.py).
  # Damaging (LOF) consequence tokens. DepMap 24Q4 OmicsSomaticMutations.VariantInfo
  # uses VEP consequence terms (possibly &-joined); a mutation is damaging if ANY of
  # these tokens appears. Missense is deliberately excluded (not clearly LOF).
  # cBioPortal mutationType uses MAF-style names, so both vocabularies are listed.
  damaging_classes:
    # VEP (DepMap)
    - stop_gained
    - frameshift_variant
    - splice_acceptor_variant
    - splice_donor_variant
    - start_lost
    - stop_lost
    # MAF (cBioPortal / TCGA)
    - Nonsense_Mutation
    - Frame_Shift_Del
    - Frame_Shift_Ins
    - Splice_Site
    - Translation_Start_Site
    - Nonstop_Mutation
  # Continuous score weights (each component in [0,1], score = mean of present components).
  score_components: [mutation, cn, expression]

# ---------------------------------------------------------------------------
# M2 backbone association
# ---------------------------------------------------------------------------
backbone:
  drugs: [venetoclax, navitoclax]
  metrics: [LN_IC50, AUC]
  # Pre-registered primary spec (see paper/manuscript.md pre-registration block).
  primary_drug: venetoclax
  primary_metric: LN_IC50
  # Hypothesis direction: executioner loss -> resistance -> HIGHER LN_IC50 /
  # HIGHER AUC (less killing). Positive coefficient is the pre-registered direction.
  hypothesis_direction: positive
  covariates: [lineage]

# ---------------------------------------------------------------------------
# M3 confounders
# ---------------------------------------------------------------------------
confounders:
  genes: [MCL1, BCL2, BCL2L1]     # MCL1 dependence; BCL2/BCL-xL ratio
  ratio: [BCL2, BCL2L1]            # numerator, denominator for the ratio feature
  bcl2_hotspots: [G101V, D103Y, D103E, D103V, V156D]  # venetoclax-resistance hotspots

# ---------------------------------------------------------------------------
# M4 multiverse
# ---------------------------------------------------------------------------
multiverse:
  lof_definitions: [mutation_only, expression_only, cn_only, any_of_three, continuous_score]
  expr_low_quantiles: [0.05, 0.10, 0.20]
  drugs: [venetoclax, navitoclax]
  metrics: [LN_IC50, AUC]
  lineage_subsets: [all_heme, leukemia_only, lymphoma_only]
  covariate_sets: [none, lineage, lineage_plus_mcl1]
  multiple_comparison: fdr_bh

# ---------------------------------------------------------------------------
# Hematologic lineage filter (DepMap OncotreeLineage / primary disease)
# ---------------------------------------------------------------------------
heme_lineages:
  - Myeloid
  - Lymphoid
  - Leukemia
  - Lymphoma
  - Myeloma
  - Blood
  - Bone Marrow

# ---------------------------------------------------------------------------
# Data release identifiers — filled in during M0 from actual downloads.
# Leave as null until the real file is on disk; never guess a release ID.
# ---------------------------------------------------------------------------
data_releases:
  depmap: "DepMap Public 24Q4 (figshare article 27993248)"
  gdsc: "GDSC release-8.4, fitted dose response dated 24Jul22 (Sanger FTP)"
  beataml: "cBioPortal aml_ohsu_2022 (Beat AML, OHSU Cancer Cell 2022) — expression/mutation via API; ex vivo drug response resolved separately (see MANIFEST/BLOCKERS)"
  tcga: "cBioPortal REST API — laml_tcga_pan_can_atlas_2018 + dlbc_tcga_pan_can_atlas_2018 (PanCancer Atlas)"

# Exact DepMap 24Q4 figshare file IDs (download via https://ndownloader.figshare.com/files/<id>)
depmap_files:
  Model.csv: 51065297
  OmicsExpressionProteinCodingGenesTPMLogp1.csv: 51065489
  OmicsCNGene.csv: 51065324
  OmicsSomaticMutations.csv: 51065732
  CRISPRGeneEffect.csv: 51064667

gdsc_base: "https://ftp.sanger.ac.uk/pub/project/cancerrxgene/releases/release-8.4"
gdsc_files:
  - GDSC1_fitted_dose_response_24Jul22.csv
  - GDSC2_fitted_dose_response_24Jul22.csv
  - screened_compounds_rel_8.4.csv
  - Cell_Lines_Details.xlsx

cbioportal_api: "https://www.cbioportal.org/api"
tcga_studies:
  LAML: laml_tcga_pan_can_atlas_2018
  DLBC: dlbc_tcga_pan_can_atlas_2018
beataml_study: aml_ohsu_2022

# Beat AML 2.0 native data (biodev/beataml2.0_data) — self-consistent dbgap IDs so
# ex vivo inhibitor AUC links to RNA-seq. This is the primary BeatAML source for the
# patient-level venetoclax analysis (F8); cBioPortal aml_ohsu_2022 is a cross-check.
beataml2_base: "https://github.com/biodev/beataml2.0_data/raw/main"
beataml2_files:
  - beataml_wv1to4_clinical.xlsx
  - beataml_waves1to4_norm_exp_dbgap.txt
  - beataml_wes_wv1to4_mutations_dbgap.txt
  - beataml_probit_curve_fits_v4_dbgap.txt
  - beataml_drug_families.xlsx
  - beataml_waves1to4_sample_mapping.xlsx

# Entrez IDs for panel genes (cBioPortal fetches by entrezGeneId). Resolved from HGNC.
entrez_ids:
  BAX: 581
  BAK1: 578
  BCL2: 596
  MCL1: 4170
  BCL2L1: 598
  BCL2A1: 597
  BCL2L2: 599
  PMAIP1: 5366
  BBC3: 27113
  BID: 637
  BCL2L11: 10018
  BAD: 572
  CRLS1: 54675
  TIMM23: 100287932
  TIMM17A: 10440
  TIMM50: 92609
  TOMM20: 9804
  TOMM22: 56993
  TOMM40: 10452
  TOMM70: 9868

spatial:
  candidates_min: 3
  qc:
    min_counts_per_spot: 200
    min_genes_per_spot: 100
    require_genes: [BAX, BAK1, BCL2, MCL1]

# ===========================================================================
# CORE LIBRARY (src/atap/) config — adharv's pipeline lineage.
# Disjoint keys from the above (only 'seed' was shared; unified to 20260710).
# The atap package reads these; the flat src/ modules read the keys above.
# ===========================================================================

# --- executioner-loss score (M1, features.executioner_loss_score) -------------------
executioner:
  low_pct: 0.10              # bottom-decile expression cutoff for BAX/BAK "loss"
  # availability = max(percentile(BAX), percentile(BAK1)); LoF mutation zeroes a gene;
  # binary call = both effectors <= low_pct OR a BAX/BAK1 LoF mutation

# --- two-axis quadrant thresholds (scoring._quadrant) -------------------------------
quadrant:
  veneto_low: 0.40           # venetoclax percentile below this = predicted to fail
  atap_high: 0.60            # ATAP percentile above this = predicted to work

# --- block weights (scoring.BLOCK_WEIGHTS) ------------------------------------------
block_weights:
  bcl2_dependence: 1.0
  mcl1_bclxl_backup: 1.0
  priming_activators: 1.0
  effector_competence: 1.6   # up-weighted: the mechanistic crux, opposite signs across agents
  execution_competence: 1.0
  mito_mass: 0.8
# NOTE (cycle 8/9/12): the composite these weights produce is beaten by BCL2 alone in
# patients and only mixed in cell lines; treated as a hypothesis, not a validated model.

# --- statistics ---------------------------------------------------------------------
stats:
  n_perm: 2000               # permutation-null draws (spec-curve uses 1000 for runtime)
  n_boot: 2000               # bootstrap-CI draws
  ci: [2.5, 97.5]            # 95% CI percentiles

# --- monocytic-differentiation signature (venetoclax-resistance confounder) ---------
monocytic_markers: [LYZ, CD14, CSF1R, FCN1, MAFB, VCAN, CD68, ITGAM]

# --- cohorts / data sources (see data/raw/MANIFEST.md for provenance) ---------------
cohorts:
  beataml_study: aml_ohsu_2022        # cBioPortal study id (expression + mutations, live API)
  beataml_drug: data/raw/beataml/beataml_probit_curve_fits_v4.txt   # venetoclax ex-vivo AUC
  depmap_dir: data/raw/depmap          # 24Q2 (figshare 25880521)
  gdsc_file: data/raw/gdsc/GDSC2_fitted_dose_response.xlsx          # release 8.5
  heme_lineage_regex: "Myeloid|Lymph|Leuk|Blood|Plasma"
