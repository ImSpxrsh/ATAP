  BCL2: 596
  MCL1: 4170
  BCL2L1: 598
  BCL2A1: 597
  BCL2L2: 599
  PMAIP1: 5366
  BBC3: 27113
  BID: 637
  BCL2L11: 10018
  BAD: 572
  CRLS1: 54675
  TIMM23: 100287932
  TIMM17A: 10440
  TIMM50: 92609
  TOMM20: 9804
  TOMM22: 56993
  TOMM40: 10452
  TOMM70: 9868

spatial:
  candidates_min: 3
  qc:
    min_counts_per_spot: 200
    min_genes_per_spot: 100
    require_genes: [BAX, BAK1, BCL2, MCL1]
